controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    leg_joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

leg_joint_trajectory_controller:
  ros__parameters:
    joints:
      - joint_Leg_1
      - joint_Leg2
      - joint_Leg_3
      - joint_Leg_4
    command_interfaces:
      - position
    state_interfaces:
      - position
    gains:
      joint_Leg_1:
        p: 100.0
        d: 10.0
        i: 0.0
        i_clamp: 0.0
      joint_Leg2:
        p: 100.0
        d: 10.0
        i: 0.0
        i_clamp: 0.0
      joint_Leg_3:
        p: 100.0
        d: 10.0
        i: 0.0
        i_clamp: 0.0
      joint_Leg_4:
        p: 100.0
        d: 10.0
        i: 0.0
        i_clamp: 0.0
    constraints:
      goal_time: 0.0
      stopped_velocity_tolerance: 0.01
    allow_non_integrated_joints: true